function openBrand(brand) {
  selectedBrand = brand; currentView = 'brand';
  document.getElementById('nav-home').classList.remove('active');
  renderAll();
}

// ============ SELL MODAL ============
function openSellModal() {
  sellCondition = CONDITIONS[0];
  sellImageData = null;
  document.getElementById('sellModalBox').innerHTML = sellFormHTML();
  document.getElementById('sellModalOverlay').style.display = 'flex';
}
function closeSellModal() {
  document.getElementById('sellModalOverlay').style.display = 'none';
}
function sellFormHTML() {
  const brandsOpts = BRANDS.map(b=>`<option value="${b}">${b}</option>`).join('');
  const sizesOpts = SIZES.map(s=>`<option value="${s}" ${s==='100ml'?'selected':''}>${s}</option>`).join('');
  const remOpts = REMAINING.map(r=>`<option value="${r}">${r}</option>`).join('');
  const cityOpts = CITIES.map(c=>`<option value="${c}">${c}</option>`).join('');
  const condBtns = CONDITIONS.map(c=>`<button type="button" class="cond-btn ${c===sellCondition?'active':''}" onclick="setSellCond('${c}')">${c}</button>`).join('');
  return `
    <button class="modal-close" onclick="closeSellModal()">×</button>
    <h2 class="modal-title">بيع عطرك</h2>
    <p class="modal-sub">سيتم التواصل معك لتنسيق عملية البيع. عمولة المنصة ٥٪ فقط.</p>
    <div class="form-grid">
      <div class="full"><label class="form-label">اسمك</label><input type="text" id="f_seller" placeholder="محمد عبدالله" style="width:100%"/></div>
      <div class="full"><label class="form-label">رقم الجوال</label><input type="tel" id="f_phone" placeholder="05xxxxxxxx" style="width:100%"/></div>
      <div class="full"><label class="form-label">اسم العطر</label><input type="text" id="f_name" placeholder="مثال: Black Orchid" style="width:100%"/></div>
      <div><label class="form-label">البراند</label><select id="f_brand" style="width:100%">${brandsOpts}</select></div>
      <div><label class="form-label">المدينة</label><select id="f_city" style="width:100%">${cityOpts}</select></div>
      <div><label class="form-label">الحجم</label><select id="f_size" style="width:100%">${sizesOpts}</select></div>
      <div><label class="form-label">المتبقي من العطر</label><select id="f_rem" style="width:100%">${remOpts}</select></div>
      <div class="full"><label class="form-label">الحالة</label><div class="condition-row" id="condRow">${condBtns}</div></div>
      <div><label class="form-label">السعر المطلوب (ر.س)</label><input type="number" id="f_price" placeholder="350" style="width:100%" oninput="updateCommission()"/></div>
      <div><label class="form-label">عمولة المنصة (٥٪)</label><div class="commission-display" id="commDisplay">—</div></div>
      <div class="full"><label class="form-label">وصف إضافي (اختياري)</label><textarea id="f_desc" placeholder="سبب البيع، ملاحظات عن العطر..." style="width:100%"></textarea></div>
      <div class="full">
        <label class="form-label">صورة العطر</label>
        <label class="img-upload" id="imgUploadLabel">
          <input type="file" accept="image/*" id="imgInput" onchange="handleImage(event)"/>
          <div id="imgPreviewWrap">
            <div class="img-upload-icon">📸</div>
            <div style="font-size:13px">اضغط لرفع صورة العطر</div>
            <div style="font-size:11px;color:#444;margin-top:4px">JPG, PNG — حتى 5MB</div>
          </div>
        </label>
      </div>
    </div>
    <button class="btn-primary" onclick="submitSell()">🌿 نشر إعلان البيع</button>`;
}
function setSellCond(c) {
  sellCondition = c;
  document.querySelectorAll('.cond-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === c);
  });
}
function updateCommission() {
  const p = parseInt(document.getElementById('f_price')?.value) || 0;
  document.getElementById('commDisplay').textContent = p ? Math.round(p*0.05).toLocaleString()+' ر.س' : '—';
}
function handleImage(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    sellImageData = ev.target.result;
    document.getElementById('imgPreviewWrap').innerHTML =
      `<img src="${sellImageData}" style="width:100%;height:160px;object-fit:cover;border-radius:8px"/>`;
  };
  reader.readAsDataURL(file);
}
function submitSell() {
  const name = document.getElementById('f_name')?.value?.trim();
  const seller = document.getElementById('f_seller')?.value?.trim();
  const price = parseInt(document.getElementById('f_price')?.value);
  if (!name || !seller || !price) { showToast('⚠️ يرجى تعبئة الحقول المطلوبة','#e74c3c'); return; }
  const newL = {
    id: nextId++,
    name,
    brand: document.getElementById('f_brand').value,
    price,
    originalPrice: Math.round(price * 1.6),
    size: document.getElementById('f_size').value,
    remaining: document.getElementById('f_rem').value,
    condition: sellCondition,
    seller,
    city: document.getElementById('f_city').value,
    description: document.getElementById('f_desc').value,
    image: sellImageData,
    sold: false,
    date: new Date().toISOString().split('T')[0],
  };
  listings.unshift(newL);
  closeSellModal();
  updateCityFilter();
  renderAll();
  showToast('✅ تم نشر إعلانك بنجاح!');
}

        ${imgContent}
      </div>

        <div class="detail-name">${l.name}</div>
        <div class="badges">
          ${badge(l.size,'#8a8a8a')}
          ${badge(l.remaining+' متبقي','#C9A96E')}
          ${badge(l.condition,'#5dade2')}
        </div>
      </div>
    </div>
    <div class="price-box">
      <div class="price-row"><span class="price-label">السعر الجديد أصلاً</span><span class="price-original">${l.originalPrice.toLocaleString()} ر.س</span></div>
      <div class="price-row"><span class="price-label2">سعر البيع</span><span class="price-big">${l.price.toLocaleString()} ر.س</span></div>
      <div class="savings-row"><span class="savings-text">توفير ${savPct}٪</span><span class="savings-val">${savings.toLocaleString()} ر.س</span></div>
    </div>
    ${l.description ? `<div class="desc-section"><div class="desc-label">ملاحظات البائع</div><div class="desc-text">${l.description}</div></div>` : ''}
    <div class="seller-box">
      <div class="seller-item"><div class="seller-item-label">البائع</div><div class="seller-item-val">${l.seller}</div></div>
      <div class="seller-item"><div class="seller-item-label">المدينة</div><div class="seller-item-val">${l.city}</div></div>
      <div class="seller-item seller-item-date" style="margin-right:auto"><div class="seller-item-label">تاريخ النشر</div><div class="seller-item-val">${l.date}</div></div>
    </div>
    <div class="commission-note">
      <span style="font-size:16px">ℹ️</span>
      <span class="commission-note-text">عمولة المنصة ٥٪ من قيمة البيع = <strong style="color:#C9A96E">${comm} ر.س</strong> يتحملها البائع بعد اتمام الصفقة</span>
    </div>
    ${!l.sold ? `<button class="btn-primary" onclick="openContact(${l.id})">📞 تواصل مع البائع</button>` : ''}
  `;
  document.getElementById('detailModalOverlay').style.display = 'flex';
}
function closeDetailModal() {
  document.getElementById('detailModalOverlay').style.display = 'none';
}

// ============ CONTACT MODAL ============
function openContact(id) {
  closeDetailModal();
  const l = listings.find(x=>x.id===id); if(!l) return;
  document.getElementById('contactModalBox').innerHTML = `
    <button class="modal-close" onclick="closeContactModal()">×</button>
    <div class="contact-center">
      <div class="contact-icon">📞</div>
      <h3 class="contact-title">التواصل مع البائع</h3>
      <p class="contact-sub">سيتم التنسيق معك من المنصة خلال ٢٤ ساعة لإتمام الصفقة</p>
      <div class="contact-item-box">
        <div class="contact-item-label">تهمك</div>
        <div class="contact-item-name">${l.brand} – ${l.name}</div>
        <div class="contact-item-price">${l.price.toLocaleString()} ر.س</div>
      </div>
      <input type="tel" class="contact-input" id="buyerPhone" placeholder="رقم جوالك للتواصل"/>
      <button class="btn-primary" onclick="submitContact()">أرسل طلبي</button>
    </div>`;
  document.getElementById('contactModalOverlay').style.display = 'flex';
}
function closeContactModal() {
  document.getElementById('contactModalOverlay').style.display = 'none';
}
function submitContact() {
  closeContactModal();
  showToast('✅ تم إرسال طلبك! سنتواصل معك قريباً');
}

// ============ INIT ============
updateCityFilter();
renderAll();
